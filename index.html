<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cat's Cradle - Hand Tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0a0e27;
            font-family: 'Courier New', monospace;
            color: #00ff88;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 12px;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            z-index: 10;
            background: rgba(10, 14, 39, 0.8);
            padding: 12px 16px;
            border: 1px solid #00ff88;
            border-radius: 4px;
        }

        #stats {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 11px;
            color: #00ffff;
            text-shadow: 0 0 8px #00ffff;
            z-index: 10;
            background: rgba(10, 14, 39, 0.8);
            padding: 12px 16px;
            border: 1px solid #00ffff;
            border-radius: 4px;
        }

        #debug {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 10px;
            color: #ffff00;
            text-shadow: 0 0 8px #ffff00;
            z-index: 10;
            background: rgba(10, 14, 39, 0.8);
            padding: 10px 12px;
            border: 1px solid #ffff00;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="status">
        <div id="status-text">Loading...</div>
    </div>

    <div id="stats">
        <div id="stats-text">FPS: 0</div>
        <div id="hands-text">Hands: 0</div>
    </div>

    <div id="debug">
        <div id="debug-text">Initializing...</div>
    </div>

    <!-- MediaPipe Hands Library -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.4.1633559619/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.4.1633559619/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1633559619/hands.js"></script>

    <script>
        // ==================== CONFIGURATION ====================
        const APP = {
            canvas: null,
            ctx: null,
            video: null,
            hands: null,
            camera: null,
            results: null,
            running: false,
            particles: [],
            lastTime: 0,
            fps: 0,
        };

        const COLORS = {
            cyan: { r: 0, g: 255, b: 255 },
            magenta: { r: 255, g: 0, b: 255 },
            lime: { r: 0, g: 255, b: 136 },
            yellow: { r: 255, g: 255, b: 0 },
            purple: { r: 150, g: 0, b: 255 },
        };

        // ==================== PARTICLE CLASS ====================
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8 - 2;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 4 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life -= 0.02;
                this.vx *= 0.98;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life;
                ctx.fillStyle = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
                ctx.shadowColor = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
        }

        // ==================== UTILITY FUNCTIONS ====================
        function log(msg) {
            console.log('[CAT CRADLE]', msg);
            document.getElementById('debug-text').textContent = msg;
        }

        function setStatus(msg) {
            document.getElementById('status-text').textContent = msg;
        }

        function distance(p1, p2) {
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function getColor(handIdx, landmarkIdx) {
            const colorArray = Object.values(COLORS);
            const idx = (handIdx * 7 + landmarkIdx) % colorArray.length;
            return colorArray[idx];
        }

        function drawGlowJoint(x, y, color, size = 6) {
            const ctx = APP.ctx;
            ctx.shadowColor = `rgb(${color.r}, ${color.g}, ${color.b})`;
            ctx.shadowBlur = 20;
            ctx.fillStyle = `rgb(${color.r}, ${color.g}, ${color.b})`;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 8;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(x, y, size * 0.4, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawGlowLine(x1, y1, x2, y2, color, thickness = 2) {
            const ctx = APP.ctx;
            ctx.strokeStyle = `rgb(${color.r}, ${color.g}, ${color.b})`;
            ctx.lineWidth = thickness;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowColor = `rgb(${color.r}, ${color.g}, ${color.b})`;
            ctx.shadowBlur = 25;

            ctx.globalAlpha = 0.8;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            ctx.shadowBlur = 12;
            ctx.globalAlpha = 1;
            ctx.lineWidth = thickness * 0.6;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // ==================== MEDIAPIPE SETUP ====================
        async function setupMediaPipe() {
            log('Setting up MediaPipe...');

            APP.hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1633559619/${file}`;
                }
            });

            APP.hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5,
            });

            APP.hands.onResults((results) => {
                APP.results = results;
            });

            log('MediaPipe ready');
        }

        async function setupCamera() {
            log('Requesting camera access...');

            APP.video = document.createElement('video');
            APP.video.style.display = 'none';
            document.body.appendChild(APP.video);

            try {
                APP.camera = new Camera(APP.video, {
                    onFrame: async () => {
                        try {
                            await APP.hands.send({ image: APP.video });
                        } catch (e) {
                            console.error('Hand detection error:', e);
                        }
                    },
                    width: 1280,
                    height: 720,
                });

                await APP.camera.start();
                log('Camera started');
                APP.running = true;
            } catch (error) {
                log('Camera error: ' + error.message);
                setStatus('❌ Camera access denied');
                throw error;
            }
        }

        // ==================== RENDERING ====================
        function drawHands() {
            if (!APP.results || !APP.results.multiHandLandmarks) return;

            const landmarks = APP.results.multiHandLandmarks;
            const numHands = landmarks.length;

            // Draw each hand skeleton
            for (let handIdx = 0; handIdx < numHands; handIdx++) {
                const hand = landmarks[handIdx];

                const connections = [
                    [0, 1], [1, 2], [2, 3], [3, 4],
                    [0, 5], [5, 6], [6, 7], [7, 8],
                    [0, 9], [9, 10], [10, 11], [11, 12],
                    [0, 13], [13, 14], [14, 15], [15, 16],
                    [0, 17], [17, 18], [18, 19], [19, 20]
                ];

                for (const [start, end] of connections) {
                    const p1 = hand[start];
                    const p2 = hand[end];
                    const x1 = p1.x * APP.canvas.width;
                    const y1 = p1.y * APP.canvas.height;
                    const x2 = p2.x * APP.canvas.width;
                    const y2 = p2.y * APP.canvas.height;

                    const color = getColor(handIdx, start);
                    drawGlowLine(x1, y1, x2, y2, color, 1.5);
                }

                // Draw joints
                for (let i = 0; i < hand.length; i++) {
                    const landmark = hand[i];
                    const x = landmark.x * APP.canvas.width;
                    const y = landmark.y * APP.canvas.height;
                    const color = getColor(handIdx, i);
                    drawGlowJoint(x, y, color, 4);
                }
            }

            // Draw strings between hand fingertips
            if (numHands === 2) {
                const left = landmarks[0];
                const right = landmarks[1];
                const fingertips = [4, 8, 12, 16, 20];

                for (let i = 0; i < fingertips.length; i++) {
                    const leftTip = left[fingertips[i]];
                    const rightTip = right[fingertips[i]];

                    const x1 = leftTip.x * APP.canvas.width;
                    const y1 = leftTip.y * APP.canvas.height;
                    const x2 = rightTip.x * APP.canvas.width;
                    const y2 = rightTip.y * APP.canvas.height;

                    const dist = distance({ x: x1, y: y1 }, { x: x2, y: y2 });
                    const maxDist = Math.sqrt(APP.canvas.width ** 2 + APP.canvas.height ** 2) * 0.5;
                    const norm = Math.min(dist / maxDist, 1);

                    // Color gradient based on distance
                    let color;
                    if (norm < 0.33) {
                        color = COLORS.lime;
                    } else if (norm < 0.66) {
                        const t = (norm - 0.33) / 0.33;
                        color = {
                            r: Math.round(COLORS.lime.r * (1 - t) + COLORS.yellow.r * t),
                            g: Math.round(COLORS.lime.g * (1 - t) + COLORS.yellow.g * t),
                            b: Math.round(COLORS.lime.b * (1 - t) + COLORS.yellow.b * t),
                        };
                    } else {
                        const t = (norm - 0.66) / 0.34;
                        color = {
                            r: Math.round(COLORS.yellow.r * (1 - t) + COLORS.magenta.r * t),
                            g: Math.round(COLORS.yellow.g * (1 - t) + COLORS.magenta.g * t),
                            b: Math.round(COLORS.yellow.b * (1 - t) + COLORS.magenta.b * t),
                        };
                    }

                    const thickness = 1 + norm * 3;
                    const controlX = (x1 + x2) / 2;
                    const controlY = (y1 + y2) / 2 + norm * 30;

                    const ctx = APP.ctx;
                    ctx.strokeStyle = `rgb(${color.r}, ${color.g}, ${color.b})`;
                    ctx.lineWidth = thickness;
                    ctx.lineCap = 'round';
                    ctx.shadowColor = `rgb(${color.r}, ${color.g}, ${color.b})`;
                    ctx.shadowBlur = 20 + norm * 15;

                    ctx.globalAlpha = 0.8;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.quadraticCurveTo(controlX, controlY, x2, y2);
                    ctx.stroke();

                    ctx.globalAlpha = 1;
                    ctx.shadowBlur = 0;

                    // Particle collision effect
                    if (dist < 40) {
                        for (let p = 0; p < 8; p++) {
                            const ex = (x1 + x2) / 2;
                            const ey = (y1 + y2) / 2;
                            APP.particles.push(new Particle(ex, ey, color));
                        }
                    }
                }
            }
        }

        function drawParticles() {
            for (let i = APP.particles.length - 1; i >= 0; i--) {
                APP.particles[i].update();
                APP.particles[i].draw(APP.ctx);
                if (APP.particles[i].life <= 0) {
                    APP.particles.splice(i, 1);
                }
            }
        }

        // ==================== ANIMATION LOOP ====================
        function animate() {
            const now = performance.now();
            if (APP.lastTime !== 0) {
                const delta = now - APP.lastTime;
                APP.fps = 1000 / delta;
            }
            APP.lastTime = now;

            // Clear canvas
            APP.ctx.fillStyle = '#0a0e27';
            APP.ctx.fillRect(0, 0, APP.canvas.width, APP.canvas.height);

            if (APP.running) {
                drawHands();
                drawParticles();

                const handCount = APP.results && APP.results.multiHandLandmarks ? APP.results.multiHandLandmarks.length : 0;
                setStatus(`✓ Running | Hands: ${handCount}`);
                document.getElementById('hands-text').textContent = `Hands: ${handCount}`;
            }

            document.getElementById('stats-text').textContent = `FPS: ${Math.round(APP.fps)}`;

            requestAnimationFrame(animate);
        }

        // ==================== INITIALIZATION ====================
        async function init() {
            try {
                // Canvas setup
                APP.canvas = document.getElementById('canvas');
                APP.ctx = APP.canvas.getContext('2d');
                APP.canvas.width = window.innerWidth;
                APP.canvas.height = window.innerHeight;

                log('Canvas initialized');

                // MediaPipe setup
                await setupMediaPipe();

                // Camera setup
                await setupCamera();

                // Start animation
                animate();

                setStatus('✓ Ready - Show your hands!');
                log('All systems ready');
            } catch (error) {
                console.error(error);
                log('Error: ' + error.message);
                setStatus('❌ Initialization failed');
            }
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            if (APP.canvas) {
                APP.canvas.width = window.innerWidth;
                APP.canvas.height = window.innerHeight;
            }
        });

        // Start when DOM is ready
        window.addEventListener('load', () => {
            log('Page loaded');
            init();
        });

        // Fallback if load event doesn't fire
        setTimeout(() => {
            if (!APP.running) {
                log('Timeout - forcing init');
                init();
            }
        }, 2000);
    </script>
</body>
</html>
