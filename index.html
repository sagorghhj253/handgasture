<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nebula Strings - Interactive Hand Tracking Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Orbitron', 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }

        /* CRT scanline overlay + futuristic ambient */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 20, 40, 0.3) 0px,
                rgba(0, 255, 255, 0.02) 2px,
                transparent 3px,
                transparent 6px
            );
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.6);
        }

        /* subtle vignette + glow border */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(0, 255, 255, 0.15) inset;
        }

        /* info panel - futuristic HUD */
        .info-panel {
            position: fixed;
            bottom: 16px;
            left: 16px;
            background: rgba(0, 5, 15, 0.7);
            backdrop-filter: blur(6px);
            border-left: 3px solid #0ff;
            padding: 8px 16px;
            border-radius: 0 12px 12px 0;
            font-size: 12px;
            letter-spacing: 1px;
            color: #0ff;
            text-shadow: 0 0 4px cyan;
            font-family: monospace;
            z-index: 30;
            pointer-events: none;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
        }

        .info-panel span {
            color: #ff44ee;
            font-weight: bold;
        }

        .status-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(5px);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #0ff;
            border: 1px solid rgba(0,255,255,0.5);
            font-family: monospace;
            z-index: 30;
            pointer-events: none;
        }
    </style>
    <!-- Load MediaPipe Hands and p5.js -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<div class="crt-overlay"></div>
<div class="vignette"></div>
<div class="info-panel">
    ⚡ <span>NEBULA STRINGS</span> • FINGERTIP WEAVE ⚡<br>
    🤘 Move hands apart → strings stretch & glow intensifies | ✨ Touch fingertips → particle explosion
</div>
<div class="status-badge" id="cameraStatus">🔍 INITIALIZING CAMERA...</div>

<script>
    // ----------------------------------------------
    //  GLOBALS & STATE
    // ----------------------------------------------
    let videoElement;
    let handsInstance;
    let cameraActive = false;
    
    // Store all landmarks for both hands (21 points each) for drawing full hand skeleton
    let leftHandLandmarks = null;
    let rightHandLandmarks = null;
    
    // Fingertip indices for string connections (MediaPipe HandLandmark indices)
    const FINGERTIP_IDS = [4, 8, 12, 16, 20]; // THUMB_TIP, INDEX_FINGER_TIP, MIDDLE_FINGER_TIP, RING_FINGER_TIP, PINKY_TIP
    
    // Store fingertip positions for both hands (normalized 0-1)
    let leftFingertips = [null, null, null, null, null];
    let rightFingertips = [null, null, null, null, null];
    
    // Smooth distances for elastic feel
    let currentDistances = Array(5).fill(0);
    let targetDistances = Array(5).fill(0);
    
    // Particle system for touch explosions
    let particles = [];
    const PARTICLE_LIFESPAN = 30;
    
    // Animation frame counter
    let frameCounter = 0;
    let camWidth = 640, camHeight = 480;
    
    // Particle class for explosion effects
    class Particle {
        constructor(x, y, colorVal) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = (Math.random() - 0.5) * 7 - 2;
            this.life = PARTICLE_LIFESPAN;
            this.maxLife = PARTICLE_LIFESPAN;
            this.color = colorVal;
            this.size = random(2, 6);
        }
        
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.2;
            this.life -= 1.2;
            return this.life > 0;
        }
        
        draw() {
            let alpha = map(this.life, 0, this.maxLife, 0, 0.9);
            noStroke();
            fill(red(this.color), green(this.color), blue(this.color), alpha * 200);
            ellipse(this.x, this.y, this.size * (1 - (this.life/this.maxLife) * 0.4), this.size * (1 - (this.life/this.maxLife) * 0.4));
        }
    }
    
    // MediaPipe Hands callback
    function onHandResults(results) {
        if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
            // No hands detected - gradually fade out by keeping last positions? 
            // But we'll just keep existing until next detection
            return;
        }
        
        // Reset temporary arrays
        let newLeftFingertips = [null, null, null, null, null];
        let newRightFingertips = [null, null, null, null, null];
        let newLeftLandmarks = null;
        let newRightLandmarks = null;
        
        // Process each detected hand
        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
            const landmarks = results.multiHandLandmarks[i];
            const handedness = results.multiHandedness[i].label; // "Left" or "Right"
            
            if (handedness === "Left") {
                newLeftLandmarks = landmarks;
                for (let idx = 0; idx < FINGERTIP_IDS.length; idx++) {
                    const tipId = FINGERTIP_IDS[idx];
                    const lm = landmarks[tipId];
                    if (lm) {
                        newLeftFingertips[idx] = { x: lm.x, y: lm.y, z: lm.z };
                    }
                }
            } else if (handedness === "Right") {
                newRightLandmarks = landmarks;
                for (let idx = 0; idx < FINGERTIP_IDS.length; idx++) {
                    const tipId = FINGERTIP_IDS[idx];
                    const lm = landmarks[tipId];
                    if (lm) {
                        newRightFingertips[idx] = { x: lm.x, y: lm.y, z: lm.z };
                    }
                }
            }
        }
        
        // Update global fingertip arrays
        for (let i = 0; i < 5; i++) {
            if (newLeftFingertips[i] !== null) leftFingertips[i] = newLeftFingertips[i];
            if (newRightFingertips[i] !== null) rightFingertips[i] = newRightFingertips[i];
        }
        
        // Update full landmark arrays for drawing hand skeletons
        if (newLeftLandmarks !== null) leftHandLandmarks = newLeftLandmarks;
        if (newRightLandmarks !== null) rightHandLandmarks = newRightLandmarks;
        
        // Update target distances for strings (elastic effect)
        for (let i = 0; i < 5; i++) {
            if (leftFingertips[i] && rightFingertips[i]) {
                let dx = leftFingertips[i].x - rightFingertips[i].x;
                let dy = leftFingertips[i].y - rightFingertips[i].y;
                let distNorm = Math.hypot(dx, dy);
                targetDistances[i] = distNorm;
            } else {
                targetDistances[i] = 0;
            }
        }
        
        // Smooth current distances
        for (let i = 0; i < 5; i++) {
            currentDistances[i] = lerp(currentDistances[i], targetDistances[i], 0.4);
        }
        
        // Check for fingertip touches (both hands, same finger index)
        for (let i = 0; i < 5; i++) {
            if (leftFingertips[i] && rightFingertips[i]) {
                let dx = leftFingertips[i].x - rightFingertips[i].x;
                let dy = leftFingertips[i].y - rightFingertips[i].y;
                let distance = Math.hypot(dx, dy);
                
                // Threshold for "touch" - about 2% of screen width
                if (distance < 0.025) {
                    // Create particle explosion at midpoint
                    let midX = ((leftFingertips[i].x + rightFingertips[i].x) / 2) * camWidth;
                    let midY = ((leftFingertips[i].y + rightFingertips[i].y) / 2) * camHeight;
                    
                    let explosionColors = [
                        color(0, 255, 255),   // cyan
                        color(255, 68, 238),  // magenta
                        color(255, 240, 80),  // yellow
                        color(150, 0, 255)     // purple
                    ];
                    
                    let particleCount = 15 + Math.floor(Math.random() * 12);
                    for (let p = 0; p < particleCount; p++) {
                        let col = explosionColors[Math.floor(Math.random() * explosionColors.length)];
                        particles.push(new Particle(midX, midY, col));
                    }
                }
            }
        }
    }
    
    // Initialize MediaPipe and Camera
    function initMediaPipeAndCamera() {
        handsInstance = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });
        
        handsInstance.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        handsInstance.onResults(onHandResults);
        
        // Create hidden video element for camera feed
        const video = document.createElement('video');
        video.setAttribute('autoplay', '');
        video.setAttribute('playsinline', '');
        video.style.position = 'fixed';
        video.style.top = '0';
        video.style.left = '0';
        video.style.width = '100%';
        video.style.height = '100%';
        video.style.objectFit = 'cover';
        video.style.opacity = '0.35'; // Subtle visible silhouette
        video.style.pointerEvents = 'none';
        video.style.zIndex = '1';
        document.body.appendChild(video);
        videoElement = video;
        
        // Request camera access
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 1280 }, height: { ideal: 720 } } 
            })
            .then(stream => {
                videoElement.srcObject = stream;
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    camWidth = videoElement.videoWidth || 1280;
                    camHeight = videoElement.videoHeight || 720;
                    document.getElementById('cameraStatus').innerHTML = "✅ CAMERA ACTIVE • HANDS READY";
                    cameraActive = true;
                    
                    // Start sending frames to MediaPipe
                    const processFrame = async () => {
                        if (!cameraActive || !videoElement || videoElement.paused || !handsInstance) return;
                        if (videoElement.readyState >= 2) {
                            await handsInstance.send({ image: videoElement });
                        }
                        requestAnimationFrame(processFrame);
                    };
                    processFrame();
                };
            })
            .catch(err => {
                console.error("Camera error:", err);
                document.getElementById('cameraStatus').innerHTML = "⚠️ CAMERA PERMISSION ERROR";
            });
        } else {
            document.getElementById('cameraStatus').innerHTML = "❌ No camera support";
        }
    }
    
    // Helper: Draw hand skeleton with glowing joints
    function drawHandSkeleton(landmarks, isLeft) {
        if (!landmarks) return;
        
        const connections = [
            [0, 1], [1, 2], [2, 3], [3, 4], // Thumb
            [0, 5], [5, 6], [6, 7], [7, 8], // Index
            [0, 9], [9, 10], [10, 11], [11, 12], // Middle
            [0, 13], [13, 14], [14, 15], [15, 16], // Ring
            [0, 17], [17, 18], [18, 19], [19, 20]  // Pinky
        ];
        
        // Draw connection lines (glowing)
        for (let conn of connections) {
            const start = landmarks[conn[0]];
            const end = landmarks[conn[1]];
            if (start && end) {
                let x1 = start.x * width;
                let y1 = start.y * height;
                let x2 = end.x * width;
                let y2 = end.y * height;
                
                drawingContext.shadowBlur = 8;
                drawingContext.shadowColor = isLeft ? 'rgba(0, 255, 255, 0.6)' : 'rgba(255, 68, 238, 0.6)';
                strokeWeight(2.5);
                let lineColor = isLeft ? color(0, 200, 255, 180) : color(255, 80, 220, 180);
                stroke(lineColor);
                line(x1, y1, x2, y2);
            }
        }
        
        // Draw joints (glowing dots)
        for (let i = 0; i < landmarks.length; i++) {
            const lm = landmarks[i];
            if (lm) {
                let x = lm.x * width;
                let y = lm.y * height;
                
                // Outer glow
                drawingContext.shadowBlur = 12;
                drawingContext.shadowColor = isLeft ? 'rgba(0, 255, 255, 0.8)' : 'rgba(255, 68, 238, 0.8)';
                fill(isLeft ? color(0, 255, 255) : color(255, 68, 238));
                noStroke();
                ellipse(x, y, 8, 8);
                
                // Inner bright core
                drawingContext.shadowBlur = 6;
                fill(255, 255, 255, 220);
                ellipse(x, y, 4, 4);
            }
        }
    }
    
    // Draw glowing strings between fingertips
    function drawStrings() {
        for (let i = 0; i < 5; i++) {
            let left = leftFingertips[i];
            let right = rightFingertips[i];
            
            if (left && right) {
                let fromX = left.x * width;
                let fromY = left.y * height;
                let toX = right.x * width;
                let toY = right.y * height;
                
                let distancePx = dist(fromX, fromY, toX, toY);
                let stretch = map(min(distancePx, 500), 20, 400, 0.3, 1.2);
                let lineWidth = map(min(distancePx, 500), 20, 400, 3, 12, true);
                
                // Dynamic color based on stretch and finger index
                let hue1, hue2;
                if (i === 0) { hue1 = color(0, 200, 255); hue2 = color(255, 80, 200); }
                else if (i === 1) { hue1 = color(100, 255, 200); hue2 = color(255, 150, 80); }
                else if (i === 2) { hue1 = color(255, 80, 200); hue2 = color(0, 255, 200); }
                else if (i === 3) { hue1 = color(200, 80, 255); hue2 = color(80, 255, 200); }
                else { hue1 = color(80, 200, 255); hue2 = color(255, 200, 80); }
                
                // Multiple layers for laser beam effect
                for (let layer = 0; layer < 3; layer++) {
                    let blur = 12 - layer * 3;
                    drawingContext.shadowBlur = blur;
                    drawingContext.shadowColor = `rgba(0, 255, 200, 0.7)`;
                    let alphaVal = map(layer, 0, 2, 0.9, 0.3);
                    let layerWidth = lineWidth + (layer * 2);
                    strokeWeight(layerWidth);
                    
                    // Gradient along line
                    let grad = drawingContext.createLinearGradient(fromX, fromY, toX, toY);
                    grad.addColorStop(0, `rgba(${red(hue1)}, ${green(hue1)}, ${blue(hue1)}, ${alphaVal * (0.7 + stretch * 0.3)})`);
                    grad.addColorStop(1, `rgba(${red(hue2)}, ${green(hue2)}, ${blue(hue2)}, ${alphaVal * (0.7 + stretch * 0.3)})`);
                    drawingContext.strokeStyle = grad;
                    line(fromX, fromY, toX, toY);
                }
                
                // Bright core line
                drawingContext.shadowBlur = 4;
                strokeWeight(2);
                stroke(255, 255, 200, 220);
                line(fromX, fromY, toX, toY);
                
                // Energy particles along the string
                if (frameCounter % 8 === i) {
                    let t = (sin(frameCounter * 0.05 + i) + 1) / 2;
                    let sparkX = lerp(fromX, toX, t);
                    let sparkY = lerp(fromY, toY, t);
                    fill(255, 200, 100, 230);
                    noStroke();
                    ellipse(sparkX, sparkY, 5, 5);
                }
            }
        }
    }
    
    // Update particle system
    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            let alive = particles[i].update();
            particles[i].draw();
            if (!alive) {
                particles.splice(i, 1);
            }
        }
    }
    
    // p5.js setup
    function setup() {
        let canvas = createCanvas(windowWidth, windowHeight);
        canvas.style('display', 'block');
        canvas.style('position', 'fixed');
        canvas.style('top', '0');
        canvas.style('left', '0');
        canvas.style('z-index', '10');
        canvas.style('pointer-events', 'none');
        colorMode(RGB, 255);
        frameRate(60);
        
        // Deep midnight blue background
        background(5, 8, 25);
        
        initMediaPipeAndCamera();
    }
    
    function draw() {
        // Clear with translucent background for trail effect
        background(5, 8, 25, 40);
        
        // Draw mirror-flipped camera feed as subtle background
        if (videoElement && videoElement.readyState === videoElement.HAVE_ENOUGH_DATA && cameraActive) {
            push();
            translate(width, 0);
            scale(-1, 1);
            let vidW = videoElement.videoWidth;
            let vidH = videoElement.videoHeight;
            let scaleW = width / vidW;
            let scaleH = height / vidH;
            let scaleFactor = max(scaleW, scaleH);
            let drawW = vidW * scaleFactor;
            let drawH = vidH * scaleFactor;
            let offX = (width - drawW) / 2;
            let offY = (height - drawH) / 2;
            
            // Semi-transparent silhouette effect
            tint(30, 40, 70, 60);
            image(videoElement, offX, offY, drawW, drawH);
            noTint();
            pop();
        }
        
        // Draw hand skeletons (glowing cyberpunk style)
        drawHandSkeleton(leftHandLandmarks, true);
        drawHandSkeleton(rightHandLandmarks, false);
        
        // Draw glowing strings between fingertips
        drawStrings();
        
        // Draw particle explosions
        updateParticles();
        
        // Additional ambient neon grid
        push();
        stroke(0, 255, 200, 15);
        strokeWeight(0.5);
        for (let i = 0; i < width; i += 50) {
            line(i, 0, i, height);
        }
        for (let i = 0; i < height; i += 50) {
            line(0, i, width, i);
        }
        pop();
        
        // Draw subtle scanline
        fill(0, 255, 255, 5);
        noStroke();
        rect(0, frameCounter % height, width, 2);
        
        frameCounter++;
    }
    
    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
