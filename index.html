<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nebula Strings - Hand Tracking Interactive Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Orbitron', 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }

        /* CRT scanline overlay + futuristic ambient */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 20, 40, 0.3) 0px,
                rgba(0, 255, 255, 0.02) 2px,
                transparent 3px,
                transparent 6px
            );
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.6);
        }

        /* subtle vignette + glow border */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(0, 255, 255, 0.15) inset;
        }

        /* info panel - futuristic HUD */
        .info-panel {
            position: fixed;
            bottom: 16px;
            left: 16px;
            background: rgba(0, 5, 15, 0.7);
            backdrop-filter: blur(6px);
            border-left: 3px solid #0ff;
            padding: 8px 16px;
            border-radius: 0 12px 12px 0;
            font-size: 12px;
            letter-spacing: 1px;
            color: #0ff;
            text-shadow: 0 0 4px cyan;
            font-family: monospace;
            z-index: 30;
            pointer-events: none;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
        }

        .info-panel span {
            color: #ff44ee;
            font-weight: bold;
        }

        .status-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(5px);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #0ff;
            border: 1px solid rgba(0,255,255,0.5);
            font-family: monospace;
            z-index: 30;
            pointer-events: none;
        }

        @keyframes subtlePulse {
            0% { opacity: 0.6; text-shadow: 0 0 2px cyan; }
            100% { opacity: 1; text-shadow: 0 0 8px magenta; }
        }
    </style>
    <!-- Load MediaPipe Hands and p5.js -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<div class="crt-overlay"></div>
<div class="vignette"></div>
<div class="info-panel">
    ⚡ <span>NEBULA STRINGS</span> • FINGERTIP WEAVE ⚡<br>
    🤘 Move hands apart → strings stretch & glow intensifies
</div>
<div class="status-badge" id="cameraStatus">🔍 INITIALIZING CAMERA...</div>

<script>
    // ----------------------------------------------
    //  GLOBALS & STATE
    // ----------------------------------------------
    let videoElement;          // hidden video element for MediaPipe (we'll hide it visually)
    let hands;                // MediaPipe Hands instance
    let cameraActive = false;
    
    // Landmark storage: left hand & right hand fingertips (indices: 4,8,12,16,20)
    // For each hand we store an array of 5 points {x, y} (normalized 0..1)
    let leftFingertips = [null, null, null, null, null];   // thumb, index, middle, ring, pinky
    let rightFingertips = [null, null, null, null, null];
    
    // landmark indices for fingertips (MediaPipe HandLandmark)
    const FINGERTIP_IDS = [4, 8, 12, 16, 20];   // THUMB_TIP, INDEX_FINGER_TIP, MIDDLE_FINGER_TIP, RING_FINGER_TIP, PINKY_TIP
    
    // for elastic / dynamic line effect: store previous distances for smooth lerp (optional)
    let currentDistances = Array(5).fill(0);
    let targetDistances = Array(5).fill(0);
    
    // additional glow and aesthetic variables
    let frameCount = 0;
    let camWidth = 640, camHeight = 480;
    let canvasReady = false;
    
    // particle explosion effect for fingertip touches (both hands same fingertip index)
    let particles = [];
    const PARTICLE_LIFESPAN = 25;
    
    // Particle class for tiny explosion effects
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 5 - 1.5;
            this.life = PARTICLE_LIFESPAN;
            this.maxLife = PARTICLE_LIFESPAN;
            this.color = color;
            this.size = random(2, 5);
        }
        
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.15; // slight gravity
            this.life -= 1.2;
            return this.life > 0;
        }
        
        draw() {
            let alpha = map(this.life, 0, this.maxLife, 0, 0.9);
            noStroke();
            fill(red(this.color), green(this.color), blue(this.color), alpha * 200);
            ellipse(this.x, this.y, this.size * (1 - (this.life/this.maxLife)*0.5), this.size * (1 - (this.life/this.maxLife)*0.5));
        }
    }
    
    // helper: convert normalized landmark -> canvas coordinates
    function normToCanvas(x, y, w, h) {
        return { x: x * w, y: y * h };
    }
    
    // reset fingers if tracking lost
    function resetFingertips() {
        leftFingertips = [null, null, null, null, null];
        rightFingertips = [null, null, null, null, null];
    }
    
    // Process mediapipe results: update leftFingertips & rightFingertips arrays
    function onHandResults(results) {
        if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
            // if no hands, reset after short timeout? but keep last points for smooth fading? 
            // Actually for realistic effect, if no hand, we clear fingertips so strings vanish gradually.
            resetFingertips();
            return;
        }
        
        // temporary containers for left & right detected points (by handedness)
        let newLeft = [null, null, null, null, null];
        let newRight = [null, null, null, null, null];
        
        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
            const landmarks = results.multiHandLandmarks[i];
            const handedness = results.multiHandedness[i].label; // "Left" or "Right"
            const targetArray = (handedness === "Left") ? newLeft : newRight;
            
            // extract fingertip positions (normalized 0-1)
            for (let idx = 0; idx < FINGERTIP_IDS.length; idx++) {
                const tipId = FINGERTIP_IDS[idx];
                const lm = landmarks[tipId];
                if (lm) {
                    targetArray[idx] = { x: lm.x, y: lm.y, z: lm.z };
                }
            }
        }
        
        // update global arrays only for fingertips that are present (others stay null)
        for (let i = 0; i < 5; i++) {
            if (newLeft[i] !== null) leftFingertips[i] = newLeft[i];
            if (newRight[i] !== null) rightFingertips[i] = newRight[i];
        }
        
        // Optional: reset entire arrays if one hand completely missing? To avoid ghost strings, we check if no hand found: above reset if none.
        // But if only left exists, right will be partially null; drawing handles null.
        if (results.multiHandLandmarks.length === 0) resetFingertips();
        
        // update target distances for elastic animation (for each finger pair)
        for (let i = 0; i < 5; i++) {
            if (leftFingertips[i] && rightFingertips[i]) {
                // distance in normalized coordinates (0-1 range) then map to canvas independent later for dynamic thickness
                let dx = leftFingertips[i].x - rightFingertips[i].x;
                let dy = leftFingertips[i].y - rightFingertips[i].y;
                let distNorm = Math.hypot(dx, dy);
                targetDistances[i] = distNorm;
            } else {
                targetDistances[i] = 0;
            }
        }
        
        // smooth current distances (lerp for elastic feel)
        for (let i = 0; i < 5; i++) {
            currentDistances[i] = lerp(currentDistances[i], targetDistances[i], 0.35);
        }
        
        // Detect fingertip-to-fingertip contact (both hands, same index) to trigger PARTICLE EXPLOSION
        for (let i = 0; i < 5; i++) {
            if (leftFingertips[i] && rightFingertips[i]) {
                let dx = leftFingertips[i].x - rightFingertips[i].x;
                let dy = leftFingertips[i].y - rightFingertips[i].y;
                let distance = Math.hypot(dx, dy);
                // threshold for "touch" ~ less than 2.5% of screen space (normalized ~0.025)
                if (distance < 0.028) {
                    // generate particle explosion at midpoint
                    let midXCanvas = ((leftFingertips[i].x + rightFingertips[i].x) / 2) * camWidth;
                    let midYCanvas = ((leftFingertips[i].y + rightFingertips[i].y) / 2) * camHeight;
                    let explosionColors = [color(0, 255, 255), color(255, 68, 238), color(255, 240, 80)];
                    let particleCount = 12 + Math.floor(Math.random() * 10);
                    for (let p = 0; p < particleCount; p++) {
                        let col = explosionColors[Math.floor(Math.random() * explosionColors.length)];
                        particles.push(new Particle(midXCanvas, midYCanvas, col));
                    }
                }
            }
        }
    }
    
    // Initialize MediaPipe Hands with higher detection confidence
    function initMediaPipe() {
        hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });
        
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,       // better accuracy
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        hands.onResults(onHandResults);
        
        // setup camera via mediapipe camera utils (simpler)
        const video = document.createElement('video');
        video.setAttribute('autoplay', '');
        video.setAttribute('playsinline', '');
        video.style.position = 'fixed';
        video.style.top = '0';
        video.style.left = '0';
        video.style.width = '100%';
        video.style.height = 'auto';
        video.style.opacity = '0';      // HIDE RAW VIDEO FEED but keep tracking (silhouette captured by p5)
        video.style.pointerEvents = 'none';
        video.style.zIndex = '-1';
        document.body.appendChild(video);
        videoElement = video;
        
        // Use standard getUserMedia to feed into MediaPipe
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 640 }, height: { ideal: 480 } } })
                .then(stream => {
                    videoElement.srcObject = stream;
                    videoElement.onloadedmetadata = () => {
                        videoElement.play();
                        camWidth = videoElement.videoWidth || 640;
                        camHeight = videoElement.videoHeight || 480;
                        document.getElementById('cameraStatus').innerHTML = "✅ CAMERA ACTIVE • HANDS READY";
                        cameraActive = true;
                        // send frames to MediaPipe
                        const sendToMediaPipe = async () => {
                            if (!cameraActive || !videoElement || videoElement.paused) return;
                            if (videoElement.readyState >= 2) {
                                await hands.send({ image: videoElement });
                            }
                            requestAnimationFrame(sendToMediaPipe);
                        };
                        sendToMediaPipe();
                    };
                })
                .catch(err => {
                    console.error("Camera error:", err);
                    document.getElementById('cameraStatus').innerHTML = "⚠️ CAMERA PERMISSION ERROR";
                });
        } else {
            document.getElementById('cameraStatus').innerHTML = "❌ No camera support";
        }
    }
    
    // ---------- P5.JS DRAWING: GLOWING NEON LANDMARKS + DYNAMIC STRINGS ----------
    function setup() {
        let canvas = createCanvas(windowWidth, windowHeight);
        canvas.style('display', 'block');
        canvas.style('position', 'fixed');
        canvas.style('top', '0');
        canvas.style('left', '0');
        canvas.style('z-index', '5');
        colorMode(RGB, 255);
        frameRate(60);
        background(5, 5, 20);
        // set shadowBlur globally for glow (will be tweaked per shape)
        drawingContext.shadowBlur = 0;
        initMediaPipe();
    }
    
    // draw mirrored video as subtle silhouette effect (barely visible but preserving hand tracking sense)
    function drawMirroredVideoBackground() {
        if (videoElement && videoElement.readyState === videoElement.HAVE_ENOUGH_DATA && cameraActive) {
            // push/pop to avoid transformation conflict
            push();
            translate(width, 0);
            scale(-1, 1);   // mirror horizontally for natural selfie view
            let vidW = videoElement.videoWidth;
            let vidH = videoElement.videoHeight;
            let scaleW = width / vidW;
            let scaleH = height / vidH;
            let scaleFactor = max(scaleW, scaleH);
            let drawW = vidW * scaleFactor;
            let drawH = vidH * scaleFactor;
            let offX = (width - drawW) / 2;
            let offY = (height - drawH) / 2;
            // very subtle ghost silhouette: black with blue tint
            tint(20, 30, 50, 40);
            image(videoElement, offX, offY, drawW, drawH);
            noTint();
            pop();
        } else {
            // fallback deep midnight blue gradient
            background(5, 8, 25);
        }
        // extra overlay: deep midnight blue semi-transparent to mute video further
        fill(2, 5, 15, 70);
        noStroke();
        rect(0, 0, width, height);
    }
    
    // draw glowing neon dots on landmarks for both hands (only fingertips for string sync but also all joints optional
    // extra: draw ALL 21 joints for extra cyberpunk? but at least draw fingertips as bright nodes
    function drawGlowingLandmarks() {
        // helper to draw a set of fingertips given normalized points
        function drawFingertipSet(points, hueColor) {
            if (!points) return;
            for (let i = 0; i < points.length; i++) {
                let pt = points[i];
                if (pt && pt.x && pt.y) {
                    let canvasX = pt.x * width;
                    let canvasY = pt.y * height;
                    // glow layers
                    drawingContext.shadowBlur = 14;
                    drawingContext.shadowColor = `rgba(0, 255, 255, 0.7)`;
                    // neon gradient per finger?
                    let col1 = color(0, 255, 255);   // cyan
                    let col2 = color(255, 80, 220);  // magenta
                    let mixVal = (sin(frameCount * 0.02 + i) * 0.5 + 0.5);
                    let dotColor = lerpColor(col1, col2, mixVal);
                    fill(dotColor);
                    noStroke();
                    ellipse(canvasX, canvasY, 12, 12);
                    // inner bright core
                    drawingContext.shadowBlur = 8;
                    fill(255, 255, 200, 230);
                    ellipse(canvasX, canvasY, 5, 5);
                }
            }
        }
        
        drawingContext.shadowBlur = 12;
        drawFingertipSet(leftFingertips, 'cyan');
        drawFingertipSet(rightFingertips, 'magenta');
        
        // EXTRA: draw intermediate joints for a more "neon skeleton" feel (optional cool factor)
        // but performance: only if needed - we just add subtle dots on all joints but not needed for strings
        // For performance we skip full skeleton to maintain 60fps. But why not just fingertips is fine.
    }
    
    // Draw 'laser strings' with elastic behavior, gradient glow, dynamic thickness based on distance
    function drawDynamicStrings() {
        for (let i = 0; i < 5; i++) {
            let left = leftFingertips[i];
            let right = rightFingertips[i];
            if (left && right) {
                let from = { x: left.x * width, y: left.y * height };
                let to = { x: right.x * width, y: right.y * height };
                let distancePx = dist(from.x, from.y, to.x, to.y);
                // elasticity factor: map distance (0-~800px) -> line width between 3px and 14px
                let lineWidth = map(min(distancePx, 500), 20, 400, 3.5, 14, true);
                // dynamic color intensity based on stretch: distance ratio normalized (max 1.2)
                let stretchFactor = min(distancePx / 200.0, 1.2);
                // gradient colors: cyan, magenta, yellow cycle depending on finger index + stretch
                let startColor, endColor;
                let hueShift = (i * 72 + frameCount * 1.2) % 360;
                if (i % 3 === 0) { startColor = color(0, 200 + 55 * stretchFactor, 255); endColor = color(255, 70 + stretchFactor*80, 200); }
                else if (i % 3 === 1) { startColor = color(0, 255, 200); endColor = color(255, 50, 150 + stretchFactor*80); }
                else { startColor = color(80, 255, 150); endColor = color(255, 200, 40); }
                
                // draw multiple layered strokes for laser / glow effect
                for (let glowLayer = 0; glowLayer < 3; glowLayer++) {
                    let blurAmount = 12 - glowLayer * 3;
                    drawingContext.shadowBlur = blurAmount;
                    drawingContext.shadowColor = `rgba(0, 255, 200, 0.7)`;
                    let alphaVal = map(glowLayer, 0, 2, 0.9, 0.3);
                    let layerWidth = lineWidth + (glowLayer * 2.5);
                    strokeWeight(layerWidth);
                    
                    // dynamic gradient along line
                    let grad = drawingContext.createLinearGradient(from.x, from.y, to.x, to.y);
                    grad.addColorStop(0, `rgba(${red(startColor)}, ${green(startColor)}, ${blue(startColor)}, ${alphaVal})`);
                    grad.addColorStop(1, `rgba(${red(endColor)}, ${green(endColor)}, ${blue(endColor)}, ${alphaVal})`);
                    drawingContext.strokeStyle = grad;
                    line(from.x, from.y, to.x, to.y);
                }
                // Additional energetic strokes: thin core
                drawingContext.shadowBlur = 6;
                strokeWeight(2.5);
                stroke(255, 255, 210, 200);
                line(from.x, from.y, to.x, to.y);
                
                // little energy pulses along the string (tiny sparks)
                if (frameCount % 6 === i) {
                    let sparkPos = map(sin(frameCount * 0.05 + i), -1, 1, 0, 1);
                    let sparkX = lerp(from.x, to.x, sparkPos);
                    let sparkY = lerp(from.y, to.y, sparkPos);
                    fill(255, 240, 100, 220);
                    noStroke();
                    ellipse(sparkX, sparkY, 6, 6);
                }
            }
        }
    }
    
    // update and draw particle explosions
    function updateParticles() {
        for (let i = particles.length-1; i >= 0; i--) {
            let alive = particles[i].update();
            particles[i].draw();
            if (!alive) {
                particles.splice(i,1);
            }
        }
    }
    
    // additional subtle glowing halos around hands: by drawing radial gradients around fingertips? optional for style
    function drawHandAura() {
        // Creates soft volumetric glow around each fingertip cluster
        for (let hand of [leftFingertips, rightFingertips]) {
            for (let i=0; i<hand.length; i++) {
                if (hand[i]) {
                    let cx = hand[i].x * width;
                    let cy = hand[i].y * height;
                    for (let r = 20; r < 45; r+=12) {
                        drawingContext.shadowBlur = r;
                        drawingContext.shadowColor = `rgba(0, 180, 240, 0.3)`;
                        fill(0, 255, 200, 12);
                        noStroke();
                        ellipse(cx, cy, r*1.4, r*1.4);
                    }
                }
            }
        }
    }
    
    function draw() {
        // Clear with deep midnight background + draw video silhouette (muted)
        drawMirroredVideoBackground();
        
        // then draw neon strings (laser beams) first to be behind fingertips? but fingertips on top looks better
        drawDynamicStrings();
        
        // Glow auras
        drawHandAura();
        
        // Draw glowing dots (fingertips)
        drawGlowingLandmarks();
        
        // Particle Explosions (when fingertips touch)
        updateParticles();
        
        // optional: subtle scanning lines effect (already via CSS overlay but add p5 for more)
        // extra futuristic grid dots
        push();
        stroke(0, 255, 200, 20);
        strokeWeight(0.8);
        for(let i = 0; i < width; i += 45) {
            line(i, 0, i, height);
        }
        for(let i = 0; i < height; i += 45) {
            line(0, i, width, i);
        }
        pop();
        
        frameCount++;
        // display UI info - tiny framerate independent
        fill(0, 255, 255, 80);
        noStroke();
        textFont('monospace');
        textSize(11);
        text("⚡ LASER WEAVE • FINGER TOUCH = PARTICLE BURST", 20, 30);
    }
    
    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
    
    // p5.js preload not needed here
</script>
</body>
</html>
